# EVA Configuration File

# Ollama/LLM Settings
model:
  name: "gemma:7b"  # Can be changed to gemma:2b or other models
  base_url: "http://localhost:11434"
  timeout: 120

# Agent-specific model parameters
agents:
  audio_correction:
    temperature: 0.3
    max_tokens: 1024
    top_p: 0.9
  
  intent_classification:
    temperature: 0.2
    max_tokens: 512
    top_p: 0.85
  
  conversation_manager:
    temperature: 0.7
    max_tokens: 2048
    top_p: 0.95
  
  emotional_detector:
    temperature: 0.4
    max_tokens: 512
    top_p: 0.9
  
  memory_classifier:
    temperature: 0.3
    max_tokens: 1024
    top_p: 0.9

# Context Management
context:
  max_history_messages: 10
  summary_threshold: 20
  max_tokens_per_message: 500

# Conversation Settings
conversation:
  default_role: "friend"  # friend, advisor, assistant
  enable_proactive_suggestions: true
  enable_emotional_tracking: true

# Memory Settings
memory:
  short_term_ttl_hours: 24
  long_term_importance_threshold: 7

# Web Search Settings
web_search:
  max_results: 5
  timeout: 10

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_file: "logs/eva.log"
  log_agent_decisions: true

